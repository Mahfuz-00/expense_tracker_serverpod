services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: expense_app_admin
      POSTGRES_PASSWORD: "u-WBO6gHskGKRxWCFEiPAIGbNUdyUCxs"
    volumes:
      - expense_app_admin_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "FsoYBMaGobTbod2w5M2-_YjKtChqcWMV"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: expense_app_admin_test
      POSTGRES_PASSWORD: "AfcjO4gTMpVk_JRfWqZ-GlUh5_WG9utV"
    volumes:
      - expense_app_admin_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "hlABqjcyrRH8-0aQoJMITMCam1ZSDFnP"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  expense_app_admin_data:
  expense_app_admin_test_data:
